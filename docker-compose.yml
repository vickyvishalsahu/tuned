# Local development dependencies — Postgres and Redis.
#
# NOTE: If you already have Postgres on port 5432 or Redis on port 6379
# from another project, those containers will conflict. Either stop them
# first or reuse them (just point your .env files at the existing ports).
#
# Usage:
#   docker compose up -d        # start in background
#   docker compose down         # stop
#   docker compose down -v      # stop + delete data volumes

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tuned
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
